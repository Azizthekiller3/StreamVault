services:
  # ── API Server (Kapoor-Ka-Ghulam web service on Render) ───────────────────
  - type: web
    name: Kapoor-Ka-Ghulam
    runtime: node
    region: ohio
    plan: free
    branch: main
    # Only build what Render needs: lib declarations + api-server bundle
    buildCommand: corepack enable && pnpm install --frozen-lockfile && pnpm run typecheck:libs && pnpm --filter @workspace/api-server run build
    startCommand: pnpm --filter @workspace/api-server run start
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TMDB_API_KEY
        sync: false
      - key: SESSION_SECRET
        sync: false
      - key: TELEGRAM_CHANNEL
        sync: false
      - key: ALLOWED_FRONTEND_ORIGIN
        sync: false
      - key: ADMIN_USERNAME
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
